services:
  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: php-app
    volumes:
      - ./app:/var/www/html

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
